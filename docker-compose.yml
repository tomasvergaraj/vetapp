services:
  db:
    image: postgres:16-alpine
    container_name: vetapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vetuser
      POSTGRES_PASSWORD: vetpass
      POSTGRES_DB: vetapp
    ports:
      - "5433:5432"
    volumes:
      - vetapp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vetuser -d vetapp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vetapp_pgdata:
